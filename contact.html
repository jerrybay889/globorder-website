<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 | GloBorder</title>
  <meta name="description" content="지금 바로 문의하세요. 아이디어 단계도 괜찮습니다. 첫 상담은 무료입니다." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/globals.css" />
</head>
<body>

<header class="mnav">
  <a href="/" class="logo"><span class="g">G</span>loBorder</a>
  <div class="nav-actions">
    <a href="#contact" class="nav-cta">무료 상담</a>
  </div>
</header>

<section class="contact" id="contact">
  <span class="eyebrow">Contact</span>
  <h2>지금 바로 문의하세요</h2>
  <p class="lede">아이디어 단계도 괜찮습니다.<br/>문제 정의만 있어도 충분합니다.<br/>첫 상담은 무료입니다.</p>

  <div class="c-info">
    <div class="c-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 7 9-7"/></svg>
      <span>hello@globorder.kr</span>
    </div>
    <div class="c-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>평일 09:00 – 18:00 KST</span>
    </div>
    <div class="c-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a13 13 0 010 18M12 3a13 13 0 000 18"/></svg>
      <span>국내 · 글로벌 프로젝트 모두 대응</span>
    </div>
  </div>

  <form class="c-form" id="cf" novalidate>
    <h3>무료 상담 신청</h3>
    <div class="field">
      <label for="m-name">이름 <span class="req">*</span></label>
      <input id="m-name" type="text" placeholder="홍길동" required />
    </div>
    <div class="field">
      <label for="m-email">이메일 <span class="req">*</span></label>
      <input id="m-email" type="email" placeholder="email@company.com" required />
    </div>
    <div class="field">
      <label for="m-phone">연락처</label>
      <input id="m-phone" type="tel" placeholder="010-0000-0000" />
    </div>
    <div class="field">
      <label for="m-type">문의 유형 <span class="req">*</span></label>
      <select id="m-type" required>
        <option value="">선택해 주세요</option>
        <option>AI 프로젝트·구현 상담</option>
        <option>정부지원사업 컨설팅</option>
        <option>파트너·제휴·협업</option>
        <option>AI 교육·강의</option>
        <option>기타</option>
      </select>
    </div>
    <div class="field">
      <label for="m-msg">문의 내용 <span class="req">*</span></label>
      <textarea id="m-msg" rows="4" placeholder="어떤 프로젝트를 구상 중이신가요?" required></textarea>
    </div>
    <button type="submit" class="submit-btn">무료 상담 신청 →</button>
    <p class="privacy">제출 시 개인정보 처리방침에 동의합니다.</p>
  </form>
</section>

<footer>
  <div class="logo"><span class="g" style="color:var(--cyan)">G</span>loBorder</div>
  <div>© 2026 (주)글로보더</div>
  <div class="links">
    <a href="/">홈</a> / <a href="/about.html">회사소개</a>
  </div>
</footer>

<script src="/assets/js/main.js"></script>
</body>
</html>
